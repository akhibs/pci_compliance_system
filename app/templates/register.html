<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register – PCI Compliance</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #003366, #0055a5);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .register-card {
        background: white;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }
      .register-title {
        color: #003366;
        font-weight: bold;
        text-align: center;
        margin-bottom: 5px;
      }
      .register-sub {
        color: #888;
        text-align: center;
        margin-bottom: 25px;
        font-size: 0.9rem;
      }
      .btn-register {
        background: linear-gradient(135deg, #003366, #0055a5);
        color: white;
        border: none;
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        font-size: 1rem;
      }
      .btn-register:hover {
        opacity: 0.9;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="register-card">
      <h4 class="register-title">🔒 PCI-DSS Compliance</h4>
      <p class="register-sub">Create your free account</p>

      {% with messages = get_flashed_messages() %} {% if messages %}
      <div class="alert alert-danger">{{ messages[0] }}</div>
      {% endif %} {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Choose a username"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Choose a password"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input
            type="password"
            name="confirm_password"
            class="form-control"
            placeholder="Repeat your password"
            required
          />
        </div>
        <button type="submit" class="btn btn-register">Create Account</button>
      </form>
      <hr />
      <p class="text-center text-muted mb-0">
        Already have an account?
        <a href="/">Login</a>
      </p>
    </div>
  </body>
</html>
