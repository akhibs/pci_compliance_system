<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login – PCI Compliance</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #003366, #0055a5);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: white;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }
      .login-title {
        color: #003366;
        font-weight: bold;
        text-align: center;
        margin-bottom: 5px;
      }
      .login-sub {
        color: #888;
        text-align: center;
        margin-bottom: 25px;
        font-size: 0.9rem;
      }
      .btn-login {
        background: linear-gradient(135deg, #003366, #0055a5);
        color: white;
        border: none;
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        font-size: 1rem;
      }
      .btn-login:hover {
        opacity: 0.9;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h4 class="login-title">🔒 PCI-DSS Compliance</h4>
      <p class="login-sub">Enterprise Compliance Automation System</p>

      {% with messages = get_flashed_messages() %} {% if messages %}
      <div class="alert alert-danger">{{ messages[0] }}</div>
      {% endif %} {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter username"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter password"
            required
          />
        </div>
        <button type="submit" class="btn btn-login">Login</button>
      </form>
    </div>
  </body>
</html>
