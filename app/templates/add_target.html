{% extends "base.html" %} {% block page_title %} Add Scan Target{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="mb-4">Add New Scan Target</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">System Name</label>
          <input
            type="text"
            name="name"
            class="form-control"
            placeholder="e.g. Payment Server 01"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">IP Address</label>
          <input
            type="text"
            name="ip_address"
            class="form-control"
            placeholder="e.g. 192.168.1.10"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">System Type</label>
          <select name="system_type" class="form-select">
            <option value="Server">Server</option>
            <option value="POS Terminal">POS Terminal</option>
            <option value="Database">Database</option>
            <option value="Firewall">Firewall</option>
            <option value="Workstation">Workstation</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">Add Target</button>
        <a href="/dashboard" class="btn btn-outline-secondary w-100 mt-2"
          >Cancel</a
        >
      </form>
    </div>
  </div>
</div>
{% endblock %}
